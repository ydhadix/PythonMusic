name: Release

# Cut a release by pushing a version tag that matches pyproject.toml, e.g.:
#
#   git tag v1.0.1
#   git push origin v1.0.1
#
# This release pipeline:
#   1. Builds the PEM executables for Windows and macOS (Apple Silicon) on
#      native runners.
#   2. Publishes the package to PyPI (Trusted Publishing / OIDC) — gated behind
#      step 1 so an irreversible upload never fires on a broken build.
#   3. Creates a GitHub Release with notes auto-generated from merged PR titles
#      and the executables attached as downloads.
#
# Nothing here runs on an ordinary push — only on tags of the form v*.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # --- 1. Publish the pip package -------------------------------------------
  # Gated behind the executable builds: PyPI uploads are irreversible, so we
  # never publish unless both executables built successfully in this run.
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-executables
    environment: pypi
    permissions:
      id-token: write   # required for PyPI Trusted Publishing — no API token stored
      contents: read    # job-level permissions REPLACE the defaults; without this,
                        # actions/checkout 404s on a private repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Guard: the git tag must match the version in pyproject.toml, so a
      # mistyped tag can't publish a mislabeled package.
      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "git tag = $TAG   pyproject = $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $PKG. Bump the version or fix the tag."
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # idempotent re-runs: don't hard-fail if this version is already up

  # --- 2. Build the PEM executables -----------------------------------------
  build-executables:
    name: Build PEM (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # one platform failing shouldn't cancel the others
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-14        # GitHub's Apple Silicon (ARM) runner
            label: macOS-AppleSilicon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # tinysoundfont pulls in PyAudio, whose C extension compiles against
      # PortAudio. Windows ships a prebuilt wheel, but macOS builds from source,
      # so install the PortAudio headers/lib and point the compiler at them.
      # Pin to the runner's native arch (we ship a separate build per arch) so
      # the single-arch Homebrew library links cleanly under the universal2
      # CPython that setup-python installs on macOS.
      - name: Prepare PortAudio (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install portaudio
          PA="$(brew --prefix portaudio)"
          {
            echo "ARCHFLAGS=-arch $(uname -m)"
            echo "CFLAGS=-I$PA/include"
            echo "LDFLAGS=-L$PA/lib"
          } >> "$GITHUB_ENV"

      # build.py bootstraps its own clean venv, installs PythonMusic from this
      # checkout (editable) plus PyInstaller, and freezes the PEM executable.
      - name: Build executable
        working-directory: PEM
        run: python build.py

      # build.py drops one versioned archive in PEM/dist/<system>/:
      #   Windows -> PEM-<version>.zip      macOS -> PEM-<version>.tar.gz
      # Re-stage each under a stable, version-LESS, per-platform name so the
      # docs can link to the permanent download URL that always serves the
      # newest release: github.com/.../releases/latest/download/PEM-<platform>.<ext>
      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p staging
          for f in PEM/dist/*/PEM-*.zip PEM/dist/*/PEM-*.tar.gz; do
            [ -e "$f" ] || continue
            case "$f" in
              *.tar.gz) ext="tar.gz" ;;
              *.zip)    ext="zip" ;;
              *)        continue ;;
            esac
            cp "$f" "staging/PEM-${{ matrix.label }}.${ext}"
          done
          ls -la staging

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PEM-${{ matrix.label }}
          path: staging/*
          if-no-files-found: error

  # --- 3. Publish the GitHub Release ----------------------------------------
  github-release:
    name: Create GitHub Release
    needs: [publish-pypi, build-executables]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the release
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # changelog from merged PR titles since the last tag
          files: artifacts/**/*
          fail_on_unmatched_files: true
