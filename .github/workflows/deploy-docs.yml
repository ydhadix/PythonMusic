name: Deploy docs

# Build the MkDocs site and publish it to GitHub Pages.
# Runs only when a push to main actually changes the docs (or this workflow),
# so ordinary code pushes don't trigger a site rebuild. Use the "Run workflow"
# button (workflow_dispatch) to force a rebuild any time.
# Requires: Settings -> Pages -> Source: "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "overrides/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - run: pip install -r docs/requirements.txt

      # Add --strict to fail the build on warnings (e.g. nav/link issues) once
      # the nav and files are fully in sync.
      - run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
