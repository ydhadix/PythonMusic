site_name: PythonMusic
site_url: https://pythonmusic.org
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  font: false              # no Google Fonts; use the Helvetica system stack (see extra.css)
  icon: images/icon_dark.png
  favicon: images/icon.ico
  features:
    - toc.integrate        # page sections nest under the active page in the LEFT sidebar
    - content.code.copy    # code blocks have a copy button

extra_css:
  - stylesheets/extra.css

exclude_docs: |            # files/folders in docs/ that we don't want compiled
  _snippets/*.py
  _scripts/

not_in_nav: |
  /api/**/*.md
  !/api/**/index.md
  !/api/**/constants.md
  /articles/*.md

hooks:
  - docs/_scripts/navtools.py     # nav rules for the mega-menu + left ToC (shared)
  - docs/_scripts/zip_examples.py # bundle examples/_snippets into a downloadable .zip (build/deploy only)

markdown_extensions:
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - attr_list             # image sizing/alignment: ![](img){ width="200" align="right" }
  - md_in_html            # markdown inside HTML, e.g. <figure> + <figcaption> captions
  - toc:
      toc_depth: 2          # ToC shows h1–h2 only; h3+ (e.g. method sections) are omitted

nav:
  - Overview: index.md

  - Download: download.md

  - Examples:
    - Overview:                                examples/index.md
    - Ch. 1 — Introduction and History:        examples/ch1.md
    - Ch. 2 — Elements of Music and Code:      examples/ch2.md
    - Ch. 3 — Organization and Data:           examples/ch3.md
    - Ch. 4 — Transformation and Process:      examples/ch4.md
    - Ch. 5 — Iteration and Lists:             examples/ch5.md
    - Ch. 6 — Randomness and Choices:          examples/ch6.md
    - Ch. 7 — Sonification and Big Data:       examples/ch7.md
    - Ch. 8 — Interactive Musical Instruments: examples/ch8.md
    - Ch. 9 — Making Connections:              examples/ch9.md
    - Ch. 10 — Music, Number and Nature:       examples/ch10.md
    - Ch. 11 — Exploring Powerful Ideas:       examples/ch11.md

